name: Sync data from Google Sheets

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:          # manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync data.json from Google Sheets
        env:
          SHEETS_CSV_URL: ${{ vars.SHEETS_CSV_URL }}
        run: python sync_from_sheets.py --url "$SHEETS_CSV_URL"

      - name: Commit updated data.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "chore: sync data.json from Google Sheets [skip ci]"
            git push
          fi
